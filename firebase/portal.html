<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾光旅圖 | 旅程生成平台</title>
    <link rel="icon" type="image/svg+xml" href="travel-bag-svgrepo-com.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: 'jf-openhuninn';
            src: url('https://ymdd-image-tw.s3.ap-east-2.amazonaws.com/font/jf-openhuninn-2.1.ttf') format('truetype');
        }

        :root {
            --primary: #6d9bc3;
            --primary-dark: #5a82a5;
            --text-main: #334155;
            --accent-soft: rgba(109, 155, 195, 0.15);
        }

        body { 
            font-family: 'jf-openhuninn', sans-serif; 
            background-color: #fdfdfd;
            color: var(--text-main);
            min-height: 100vh;
        }

        .app-bg-decoration {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #fdfdfd;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(109, 155, 195, 0.25);
            border-radius: 2rem;
            box-shadow: 0 15px 35px rgba(109, 155, 195, 0.08);
        }

        .app-label {
            font-size: 14px;
            font-weight: 700;
            color: #64748b;
            margin-bottom: 0.4rem;
            display: block;
        }

        .app-input {
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .app-input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--accent-soft);
            outline: none;
        }

        .btn-summer {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 6px 20px rgba(109, 155, 195, 0.25);
            transition: all 0.3s;
        }

        .btn-summer:hover { background-color: var(--primary-dark); transform: translateY(-1px); }
        .btn-summer:active { transform: scale(0.97); }

        .btn-outline {
            border: 1.5px solid var(--primary);
            color: var(--primary);
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-outline:hover { background-color: var(--accent-soft); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(6px);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .modal-content {
            background: white;
            max-width: 650px;
            width: 100%;
            max-height: 90vh;
            border-radius: 2.5rem;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .step-badge {
            background: var(--primary);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .password-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            cursor: pointer;
            padding: 0.5rem;
        }

        @keyframes logo-float-rotate {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(12deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }
        .logo-anim { animation: logo-float-rotate 5s ease-in-out infinite; }
    </style>
</head>
<body class="flex flex-col items-center py-12 px-4">

    <div class="app-bg-decoration">
        <div class="bg-circle" style="width: 500px; height: 500px; background: #6d9bc3; top: -150px; left: -100px;"></div>
        <div class="bg-circle" style="width: 400px; height: 400px; background: #f2cc8f; bottom: -50px; right: -50px; opacity: 0.15;"></div>
    </div>

    <div class="max-w-4xl w-full mt-6">
        <div class="text-center mb-10">
            <div class="inline-block mb-6 relative">
                <img src="https://rainchord.s3.ap-east-2.amazonaws.com/inventory/1768671480240_travel-bag.png" 
                     alt="Logo" class="w-20 h-20 logo-anim drop-shadow-xl">
            </div>
            <h1 class="text-3xl font-black tracking-tight" style="color: var(--primary-dark)">拾光旅圖</h1>
            <p class="text-slate-400 text-sm tracking-[0.2em] font-bold mt-1 uppercase">Travel App Maker</p>
        </div>



        <div class="grid md:grid-cols-2 gap-8 items-stretch">
            <div class="glass-card p-8 md:p-10 flex flex-col">
                <h2 class="text-2xl font-black mb-8 flex items-center text-slate-800">
                    <i class="fa-solid fa-square-plus mr-3 text-[#6d9bc3]"></i>
                    建立新行程
                </h2>

                <form id="regForm" class="space-y-4 flex-grow">
                    <div>
                        <label class="app-label">行程識別碼 (ID)</label>
                        <input type="text" id="trip_id" 
                               class="app-input w-full p-4 rounded-2xl font-bold" 
                               placeholder="例如: tokyo-trip-2024" 
                               pattern="[A-Za-z0-9\-_]+" 
                               title="僅限英文字母、數字、連字號(-)與底線(_)" 
                               required>
                        <p class="text-[10px] text-slate-400 mt-1 ml-1 font-bold">* 此 ID 將用於網址，僅限英文數字與 - _</p>
                    </div>
                    
                    <div>
                        <label class="app-label">您的暱稱</label>
                        <input type="text" id="nickname" class="app-input w-full p-4 rounded-2xl font-bold" placeholder="例如：Jerry" required>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <div class="relative">
                            <label class="app-label">設定平台查詢密碼</label>
                            <div class="relative">
                                <input type="password" id="secret_key" class="app-input w-full p-4 rounded-2xl font-bold pr-12" placeholder="未來查詢清單用" required>
                                <i class="fa-solid fa-eye-slash password-toggle" onclick="togglePassword('secret_key', this)"></i>
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="app-label">行程顯示名稱</label>
                        <input type="text" id="display_name" class="app-input w-full p-4 rounded-2xl font-bold" placeholder="例如：東京五日遊" required>
                    </div>

                    <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100/50">
                        <label class="app-label text-blue-600">行程管理金鑰 (Admin Key)</label>
                        <div class="relative">
                            <input type="password" id="admin_key_input" class="app-input w-full p-4 rounded-2xl font-bold pr-12 border-blue-200" placeholder="自訂一組私人金鑰" required>
                            <i class="fa-solid fa-eye-slash password-toggle text-blue-300" onclick="togglePassword('admin_key_input', this)"></i>
                        </div>
                        <p class="text-[10px] text-blue-400 mt-2 ml-1 font-bold">* 管理版專用，請妥善保存</p>
                    </div>

                    <div class="pb-4">
                        <div class="flex justify-between items-end mb-1">
                            <label class="app-label !mb-0">App 套用主題</label>
                            <button type="button" onclick="previewTheme()" class="text-[10px] font-black text-blue-500 hover:text-blue-700 underline underline-offset-4">
                                <i class="fa-solid fa-eye mr-1"></i>效果預覽
                            </button>
                        </div>
                        <div class="relative">
                            <select id="theme_id" class="app-input w-full p-4 rounded-2xl appearance-none cursor-pointer bg-white font-bold text-slate-600 pr-12">
                                <option value="spring" selected>🌸 春季櫻花 (粉色系)</option>
                                <option value="summer">🌊 夏季海洋 (藍色系)</option>
                                <option value="autumn">🍂 秋季楓紅 (橘黃色)</option>
                                <option value="winter">❄️ 冬季雪境 (灰藍色)</option>
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-5 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn-summer w-full font-black py-5 rounded-3xl text-lg flex items-center justify-center gap-3">
                        <span>生成我的旅圖</span>
                        <i class="fa-solid fa-wand-magic-sparkles"></i>
                    </button>
                </form>
                <div id="regMsg" class="mt-4"></div>
            </div>

            <div class="flex flex-col gap-8">
                <div class="glass-card p-8">
                    <h3 class="text-2xl font-black mb-8 flex items-center text-slate-800">
                        <i class="fa-solid fa-database mr-3 text-slate-400"></i>
                        行程庫管理
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="app-label">註冊暱稱</label>
                            <input type="text" id="q_nickname" class="app-input w-full p-4 rounded-2xl text-sm font-bold" placeholder="輸入您的暱稱">
                        </div>
                        <div>
                            <label class="app-label">查詢密碼</label>
                            <div class="relative">
                                <input type="password" id="q_key" class="app-input w-full p-4 rounded-2xl text-sm font-bold pr-12" placeholder="輸入您的查詢密碼">
                                <i class="fa-solid fa-eye-slash password-toggle" onclick="togglePassword('q_key', this)"></i>
                            </div>
                        </div>
                        <button onclick="queryMyTrips()" class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-black hover:bg-slate-200 transition-all flex items-center justify-center gap-2">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <span>即刻查詢</span>
                        </button>
                    </div>
                </div>
                <div id="queryResultsContainer" class="hidden glass-card p-6 flex-grow border-t-4" style="border-top-color: var(--primary)">
                    <div id="queryResults" class="space-y-3"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, getDocs, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD5IjcEMH0XzPhIiosenWjE2qVTCuKA3cI",
            authDomain: "travel-pro-pwa.firebaseapp.com",
            projectId: "travel-pro-pwa",
            storageBucket: "travel-pro-pwa.firebasestorage.app",
            messagingSenderId: "632960809665",
            appId: "1:632960809665:web:78661b03b2751093fd3240"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI 工具函式掛到 window，讓 HTML onclick 可以呼叫
        window.togglePassword = (inputId, el) => {
            const input = document.getElementById(inputId);
            if (input.type === 'password') { input.type = 'text'; el.classList.replace('fa-eye-slash', 'fa-eye'); }
            else { input.type = 'password'; el.classList.replace('fa-eye', 'fa-eye-slash'); }
        };
        window.previewTheme = () => {
            const theme = document.getElementById('theme_id').value;
            window.open(`index.html?trip=demo-trip&preview_theme=${theme}`, "_blank");
        };

        // 建立行程
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const msgDiv = document.getElementById('regMsg');
            const tripId = document.getElementById('trip_id').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const secretKey = document.getElementById('secret_key').value.trim();
            const adminKey = document.getElementById('admin_key_input').value.trim();
            const themeId = document.getElementById('theme_id').value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 建立中...';

            try {
                const existing = await getDoc(doc(db, 'catalog', tripId));
                if (existing.exists()) {
                    msgDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-500 rounded-2xl text-sm font-bold border border-red-100">此行程 ID 已被使用，請換一個</div>`;
                    return;
                }
                await setDoc(doc(db, 'catalog', tripId), {
                    trip_id: tripId,
                    display_name: document.getElementById('display_name').value.trim() || tripId,
                    nickname: nickname,
                    secret_key: secretKey,
                    admin_key: adminKey,
                    theme_id: themeId,
                    created_at: serverTimestamp()
                });
                await setDoc(doc(db, 'trips', tripId, 'settings', 'main'), {
                    travelers: "",
                    categories: "景點,餐廳,購物,交通,飯店",
                    wishTags: "",
                    paymentMethods: "現金,信用卡",
                    rates: []
                });
                localStorage.setItem('travel_pro_identity', JSON.stringify({
                    user: nickname.toLowerCase(),
                    key: secretKey
                }));
                msgDiv.innerHTML = `
                    <div class="mt-4 p-5 bg-white border border-slate-100 rounded-3xl shadow-xl">
                        <p class="text-slate-800 font-black mb-4 flex items-center">
                            <i class="fa-solid fa-circle-check text-green-500 mr-2 text-xl"></i> 行程建立完成！
                        </p>
                        <div class="flex flex-col gap-3">
                            <a href="index.html?trip=${tripId}" target="_blank" class="p-4 bg-slate-50 rounded-2xl flex justify-between items-center hover:bg-blue-50 transition-all group font-black text-slate-600 text-sm">
                                <span>開啟訪客版 (分享用)</span>
                                <i class="fa-solid fa-paper-plane group-hover:translate-x-1 transition-transform"></i>
                            </a>
                            <a href="index.html?trip=${tripId}&key=${adminKey}" target="_blank" class="p-4 bg-[#6d9bc3] text-white rounded-2xl flex justify-between items-center shadow-lg hover:brightness-105 transition-all font-black text-sm">
                                <span>開啟管理版 (私人用)</span>
                                <i class="fa-solid fa-lock"></i>
                            </a>
                        </div>
                    </div>`;
            } catch (err) {
                console.error(err);
                msgDiv.innerHTML = `<div class="p-4 bg-red-50 text-red-500 rounded-2xl text-sm font-bold text-center border border-red-100">建立失敗：${err.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>生成我的旅圖</span> <i class="fa-solid fa-wand-magic-sparkles"></i>';
            }
        });

        // 查詢我的行程
        window.queryMyTrips = async () => {
            const user = document.getElementById('q_nickname').value.trim().toLowerCase();
            const key = document.getElementById('q_key').value.trim();
            const resDiv = document.getElementById('queryResults');
            const container = document.getElementById('queryResultsContainer');
            if (!user || !key) return;
            container.classList.remove('hidden');
            resDiv.innerHTML = '<div class="text-center p-6"><i class="fa-solid fa-circle-notch fa-spin text-[#6d9bc3] text-2xl"></i></div>';
            try {
                const snap = await getDocs(collection(db, 'catalog'));
                const trips = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                    .filter(t => t.nickname && t.nickname.toLowerCase() === user && t.secret_key === key);
                if (trips.length > 0) {
                    localStorage.setItem('travel_pro_identity', JSON.stringify({ user, key }));
                    let html = '<div class="text-xs font-black text-slate-300 mb-4 tracking-widest text-center uppercase">您的行程庫</div>';
                    trips.forEach(item => {
                        html += `
                            <div class="bg-white p-5 rounded-2xl border border-slate-50 shadow-sm mb-3 text-sm">
                                <div class="font-black text-slate-700 mb-3 truncate flex items-center">
                                    <i class="fa-solid fa-map-location-dot mr-2 text-slate-200"></i>${item.display_name || item.trip_id}
                                </div>
                                <div class="flex gap-2">
                                    <a href="index.html?trip=${item.trip_id}" target="_blank" class="flex-grow py-3 text-[10px] font-black bg-slate-50 text-slate-400 rounded-xl text-center hover:bg-blue-50 transition-colors">訪客版</a>
                                    <a href="index.html?trip=${item.trip_id}&key=${item.admin_key}" target="_blank" class="flex-grow py-3 text-[10px] font-black bg-[#6d9bc3] text-white rounded-xl text-center shadow-sm">管理版</a>
                                </div>
                            </div>`;
                    });
                    resDiv.innerHTML = html;
                } else {
                    resDiv.innerHTML = '<div class="text-center p-8 text-slate-400 font-bold italic">查無紀錄，請檢查暱稱與密碼</div>';
                }
            } catch (err) {
                console.error(err);
                resDiv.innerHTML = '<div class="text-red-400 p-4 text-center">連線異常</div>';
            }
        };
    </script>
</body>
</html>
